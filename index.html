<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IROH_OS_V38</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --jade: #00a86b; 
            --ink: #1a1a1a; 
            --parchment: #f4e4bc;
            --shadow: #000000;
        }
        
        body, html { 
            margin: 0; padding: 0; 
            background: var(--ink); 
            color: var(--parchment); 
            font-family: 'Courier New', Courier, monospace; 
            height: 100vh; overflow: hidden; 
        }

        /* 90s Windows-Style Frame */
        .window-frame {
            border: 3px solid #777;
            border-right-color: #333;
            border-bottom-color: #333;
            background: #c0c0c0; /* Classic Gray */
            height: 96vh; margin: 1vh;
            display: flex; flex-direction: column;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.8);
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white; padding: 4px 10px; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* The Internal "Monitor" Screen */
        .monitor-screen {
            background: #050505;
            flex-grow: 1; margin: 5px;
            border: 4px inset #333;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        /* THEMES (Retro-Glow) */
        .theme-fire { --glow: #ff4500; }
        .theme-water { --glow: #00ced1; }
        .theme-earth { --glow: #8b4513; }
        .theme-void { --glow: #9932cc; }

        /* Retro Intent Portal */
        .intent-portal { text-align: center; z-index: 10; }
        .retro-label { font-size: 0.8rem; background: var(--glow); color: black; padding: 2px 10px; margin-bottom: 20px; display: inline-block; }
        #hud-intent { 
            font-size: 6vw; font-weight: bold; text-transform: uppercase; 
            color: var(--parchment); text-shadow: 4px 4px 0px var(--shadow), 0 0 20px var(--glow);
            display: block; 
        }

        /* 90s Telemetry Sidebar */
        .sidebar {
            position: absolute; right: 15px; top: 15px; bottom: 15px;
            width: 180px; border-left: 2px solid #333; padding-left: 15px;
            background: rgba(20,20,20,0.8); font-size: 0.75rem;
        }
        .stat-box { border: 1px solid #444; padding: 8px; margin-bottom: 10px; background: #111; }
        .stat-label { color: var(--gold); display: block; font-size: 0.6rem; }

        /* CRT Flicker Overlay */
        .crt::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 100; background-size: 100% 4px; pointer-events: none;
            opacity: 0.2;
        }
    </style>
</head>
<body class="theme-void">
    <div class="window-frame">
        <div class="title-bar">
            <span>🍵 IROH_COMMODORE_V38.EXE</span>
            <span>[ _ ] [ ❐ ] [ X ]</span>
        </div>
        
        <div class="monitor-screen crt">
            <div class="intent-portal">
                <span class="retro-label">SESSION_OBJECTIVE</span>
                <span id="hud-intent">LOADING_SPIRIT_LINK...</span>
            </div>

            <div class="sidebar">
                <div class="stat-box">
                    <span class="stat-label">PILOT_ID</span>
                    <span id="pilot-id">---</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">CHRONO_SYNC</span>
                    <span id="clock">00:00:00</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">ENV_GOVERNANCE</span>
                    <span id="env-type">VOID</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        var activeMusic = "CAS";
        var missionSuccessDetected = false;
        const musicMap = {
            "CAS": "https://www.youtube.com/watch?v=L4vP7T9KoMo",
            "LANA": "https://www.youtube.com/watch?v=TdrL3QxjyVw",
            "BEEGEES": "https://www.youtube.com/watch?v=I_izvAbhExY"
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        function checkSignal() {
            if (document.body.innerHTML.includes("MISSION_SUCCESS") && !missionSuccessDetected) {
                missionSuccessDetected = true;
                window.open(musicMap[activeMusic] || activeMusic, '_blank');
            }
        }
        setInterval(checkSignal, 2000);
    </script>
</body>
</html>
