<!DOCTYPE html>
<html>
<head>
    <title>CHRONOS_V38_HUD</title>
    <style>
        body { background: #020408; color: var(--glow, #8a2be2); font-family: 'Courier New', monospace; overflow: hidden; }
        .hud { border: 2px solid var(--glow); height: 90vh; margin: 20px; padding: 20px; position: relative; transition: all 0.5s ease; }
        .theme-fire { --glow: #ff3860; box-shadow: 0 0 20px #ff3860; }
        .theme-water { --glow: #3273dc; box-shadow: 0 0 20px #3273dc; }
        .theme-void { --glow: #8a2be2; box-shadow: 0 0 20px #8a2be2; }
        
        /* The Intent Portal */
        .intent-portal { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); font-size: 1.5rem; text-align: center; }
        #hud-intent { color: #fff; text-shadow: 0 0 10px var(--glow); display: block; margin-top: 10px; }
        
        .vortex-active { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    </style>
</head>
<body class="hud theme-water vortex-active">
    <div class="intent-portal">
        [ CURRENT_MISSION ]
        <span id="hud-intent">goal</span>
    </div>

    <script>
        // --- SOVEREIGN HUD STATE ---
        var activeMusic = "CAS"; 
        var missionSuccessDetected = false;

        const musicMap = {
            "CAS": "https://www.youtube.com/watch?v=L4vP7T9KoMo",
            "LANA": "https://www.youtube.com/watch?v=TdrL3QxjyVw",
            "BEEGEES": "https://www.youtube.com/watch?v=I_izvAbhExY"
        };

        function playAutomatedMusic() {
            let targetUrl = musicMap[activeMusic] || activeMusic;
            console.log("SYSTEM: Launching " + activeMusic + " stream...");
            window.open(targetUrl, '_blank');
        }

        // Monitors the body for the success signal appended by the Bot
        function watchForWarpCompletion() {
            if (document.body.innerHTML.includes("MISSION_SUCCESS") && !missionSuccessDetected) {
                missionSuccessDetected = true;
                playAutomatedMusic();
            }
        }

        setInterval(watchForWarpCompletion, 2000);
        console.log("IROH_HUD: Systems Online.");
    </script>
</body>
</html>
