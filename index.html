<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHRONOS_APEX_SOVEREIGN</title>
    <style>
        :root { --glow: #00d1b2; --bg: #010203; --font: 'Space Mono', monospace; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--glow); font-family: var(--font); height: 100vh; overflow: hidden; }
        
        .hud-container { 
            height: 100vh; width: 100vw; 
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(10, 15, 25, 1) 0%, #010203 100%);
            position: relative;
        }

        /* TELEMETRY SIDEBAR */
        .sidebar {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 200px; border-left: 1px solid var(--glow); padding: 20px;
            text-align: left; font-size: 0.7rem; letter-spacing: 1px;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }
        .data-point { margin-bottom: 15px; }
        .data-label { opacity: 0.5; display: block; margin-bottom: 5px; }
        .data-value { font-weight: bold; text-transform: uppercase; }

        /* INTENT PORTAL */
        .intent-portal { text-align: center; z-index: 10; }
        #hud-intent { 
            font-size: 8vw; font-weight: 900; text-transform: uppercase; 
            color: #fff; text-shadow: 0 0 40px var(--glow);
            letter-spacing: -5px; line-height: 0.8;
        }

        /* THEMES */
        .theme-fire { --glow: #ff3860; }
        .theme-water { --glow: #209cee; }
        .theme-earth { --glow: #48c774; }
        .theme-void { --glow: #8a2be2; }

        /* CRT EFFECTS */
        .crt::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
    </style>
</head>
<body class="theme-void">
    <div class="crt hud-container">
        <div class="intent-portal">
            <span id="hud-intent">READY_FOR_WARP</span>
        </div>

        <div class="sidebar">
            <div class="data-point">
                <span class="data-label">PILOT_ID</span>
                <span class="data-value" id="pilot-id">GUEST_USER</span>
            </div>
            <div class="data-point">
                <span class="data-label">CHRONO_SYNC</span>
                <span class="data-value" id="clock">00:00:00</span>
            </div>
            <div class="data-point">
                <span class="data-label">SYSTEM_STATUS</span>
                <span class="data-value" style="color: #48c774;">OPTIMAL</span>
            </div>
            <div class="data-point">
                <span class="data-label">ENVIRONMENT</span>
                <span class="data-value" id="env-type">VOID</span>
            </div>
        </div>
    </div>

    <script>
        var activeMusic = "CAS";
        var missionSuccessDetected = false;
        
        const musicMap = {
            "CAS": "https://www.youtube.com/watch?v=L4vP7T9KoMo",
            "LANA": "https://www.youtube.com/watch?v=TdrL3QxjyVw",
            "BEEGEES": "https://www.youtube.com/watch?v=I_izvAbhExY"
        };

        // Live Clock logic
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        function checkSignal() {
            if (document.body.innerHTML.includes("MISSION_SUCCESS") && !missionSuccessDetected) {
                missionSuccessDetected = true;
                window.open(musicMap[activeMusic] || activeMusic, '_blank');
            }
        }
        setInterval(checkSignal, 2000);
    </script>
</body>
</html>
