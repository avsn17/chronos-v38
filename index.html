<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHRONOS_ZENITH_HUD</title>
    <style>
        :root { --glow: #00d1b2; --bg: #05070a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--glow); font-family: 'Inter', 'Courier New', monospace; height: 100vh; overflow: hidden; }
        
        /* The Sovereign Frame */
        .hud { 
            border: 1px solid rgba(255,255,255,0.1); 
            height: 94vh; margin: 3vh; position: relative; 
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
            background: radial-gradient(circle at center, rgba(10, 12, 18, 0.8) 0%, #05070a 100%);
            backdrop-filter: blur(10px);
        }
        
        /* THEME OVERLAYS */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .theme-fire { --glow: #ff3860; box-shadow: inset 0 0 100px rgba(255, 56, 96, 0.2); }
        .theme-water { --glow: #3273dc; box-shadow: inset 0 0 100px rgba(50, 115, 220, 0.2); }
        .theme-air { --glow: #00d1b2; box-shadow: inset 0 0 100px rgba(0, 209, 178, 0.2); }
        .theme-void { --glow: #8a2be2; filter: contrast(1.2) saturate(1.2); }

        /* The Intent Portal (Stylish Glass-morphism) */
        .intent-portal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80%; text-align: center; z-index: 10; 
        }
        #hud-intent { 
            font-size: 5rem; font-weight: 900; text-transform: uppercase; 
            letter-spacing: -2px; color: #fff; 
            text-shadow: 0 0 30px var(--glow); 
            display: block; opacity: 0.9;
        }
        .status-tag { 
            display: inline-block; padding: 4px 12px; background: var(--glow); 
            color: #000; font-size: 0.7rem; font-weight: bold; margin-bottom: 20px;
        }

        /* Glitch Effect for VOID */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }
        .vortex-active { animation: glitch 0.3s infinite; }

        /* Scanlines */
        .scanline { width: 100%; height: 2px; background: rgba(255,255,255,0.03); position: absolute; animation: scan 4s linear infinite; z-index: 5; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="hud theme-water">
    <div class="scanline"></div>
    <div class="overlay"></div>
    <div class="intent-portal">
        <div class="status-tag">NEURAL_LINK_ACTIVE</div>
        <span id="hud-intent">goal</span>
    </div>

    <script>
        var activeMusic = "CAS";
        var missionSuccessDetected = false;
        const musicMap = {
            "CAS": "https://www.youtube.com/watch?v=L4vP7T9KoMo",
            "LANA": "https://www.youtube.com/watch?v=TdrL3QxjyVw",
            "BEEGEES": "https://www.youtube.com/watch?v=I_izvAbhExY"
        };

        function checkSignal() {
                missionSuccessDetected = true;
                let target = musicMap[activeMusic] || activeMusic;
                window.open(target, '_blank');
            }
        }
        setInterval(checkSignal, 2000);
    </script>
</body>
</html>
