<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IROH_SOVEREIGN_V38_COLOR</title>
    <style>
        :root { 
            --gold: #FFD700; --jade: #00FF9F; --pink: #FF007F; --blue: #00E5FF; --ink: #050505; 
        }
        
        body, html { 
            margin: 0; padding: 0; background: var(--ink); 
            color: white; font-family: 'MS Sans Serif', 'Courier New', monospace; 
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        /* Centered 90s Window */
        .window-frame {
            border: 4px solid #dfdfdf;
            border-right-color: #808080; border-bottom-color: #808080;
            background: #c0c0c0; width: 90vw; height: 85vh;
            display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,1), 20px 20px 0px rgba(0,0,0,0.3);
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white; padding: 6px 12px; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
            letter-spacing: 1px;
        }

        /* The Monitor - Hyper-Centered */
        .monitor-screen {
            background: #000; flex-grow: 1; margin: 8px;
            border: 6px inset #444; position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* THEME COLOR ENGINE */
        .theme-fire { --glow: var(--pink); --bg-glow: rgba(255, 0, 127, 0.1); }
        .theme-water { --glow: var(--blue); --bg-glow: rgba(0, 229, 255, 0.1); }
        .theme-earth { --glow: var(--jade); --bg-glow: rgba(0, 255, 159, 0.1); }
        .theme-air { --glow: #FFFFFF; --bg-glow: rgba(255, 255, 255, 0.1); }
        .theme-void { --glow: #BC13FE; --bg-glow: rgba(188, 19, 254, 0.1); }

        /* Centered Intent Portal */
        .intent-portal { text-align: center; z-index: 10; }
        .retro-tag { 
            background: var(--glow); color: #000; font-weight: bold;
            padding: 5px 20px; font-size: 0.9rem; margin-bottom: 30px; 
            display: inline-block; box-shadow: 4px 4px 0px #000;
        }
        #hud-intent { 
            font-size: 8vw; font-weight: 900; text-transform: uppercase; 
            color: #fff; text-shadow: 5px 5px 0px #000, 0 0 30px var(--glow);
            display: block; line-height: 1;
        }

        /* Centered Stats Footer */
        .telemetry-bar {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: center; gap: 40px;
            font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px; color: var(--glow);
        }
        .stat-item { text-align: center; }
        .stat-label { display: block; font-size: 0.6rem; opacity: 0.7; color: #fff; margin-bottom: 4px; }

        /* Scanline Overlay */
        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 20;
        }
    </style>
</head>
<body class="theme-water">
    <div class="window-frame">
        <div class="title-bar">
            <span>🌈 IROH_SOVEREIGN_TURNTABLE_V3.EXE</span>
            <span>[ ? ] [ _ ] [ ❐ ] [ X ]</span>
        </div>
        
        <div class="monitor-screen">
            <div class="crt-overlay"></div>
            
            <div class="intent-portal">
                <div class="retro-tag">NEURAL_OBJECTIVE_038</div>
                <span id="hud-intent">goal</span>
            </div>

            <div class="telemetry-bar">
                <div class="stat-item">
                    <span class="stat-label">PILOT</span>
                    <span id="pilot-id">AVI</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">TIME_SYNC</span>
                    <span id="clock">00:00:00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">VIBE_MODE</span>
                    <span id="env-type">WATER</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        var activeMusic = "CAS";
        var missionSuccessDetected = false;
        const musicMap = {
            "CAS": "https://www.youtube.com/watch?v=L4vP7T9KoMo",
            "LANA": "https://www.youtube.com/watch?v=TdrL3QxjyVw",
            "BEEGEES": "https://www.youtube.com/watch?v=I_izvAbhExY"
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        function checkSignal() {
                missionSuccessDetected = true;
                window.open(musicMap[activeMusic] || activeMusic, '_blank');
            }
        }
        setInterval(checkSignal, 2000);
    </script>
</body>
</html>
