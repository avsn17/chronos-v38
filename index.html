<!DOCTYPE html>
<html>
<head>
    <title>CHRONOS_SOVEREIGN_V3</title>
    <style>
        :root { --glow: #00d1b2; --bg: #010204; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        
        .hud { border: 2px solid var(--glow); height: 94vh; margin: 3vh; position: relative; transition: all 1s ease; background: radial-gradient(circle at center, #0a0c12 0%, #010204 100%); }
        
        /* THEME OVERLAYS */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; opacity: 0.3; }
        
        /* FIRE: Rising Embers */
        .theme-fire { --glow: #ff3860; box-shadow: 0 0 50px #ff386055; }
        .theme-fire .overlay { background: linear-gradient(0deg, #ff386033 0%, transparent 100%); animation: embers 1s infinite alternate; }
        
        /* WATER: Deep Sea Ripple */
        .theme-water { --glow: #3273dc; box-shadow: 0 0 50px #3273dc55; }
        .theme-water .overlay { background: repeating-linear-gradient(45deg, #3273dc11 0px, transparent 100px); animation: ripple 10s infinite linear; }
        
        /* VOID: Static & Glitch */
        .theme-void { --glow: #8a2be2; }
        .theme-void .overlay { background-image: url('https://media.giphy.com/media/oEI9uWUicG7vA6RWZ0/giphy.gif'); opacity: 0.05; }

        @keyframes embers { from { opacity: 0.2; } to { opacity: 0.5; } }
        @keyframes ripple { from { background-position: 0 0; } to { background-position: 500px 500px; } }

        .intent-portal { position: absolute; top: 45%; width: 100%; text-align: center; z-index: 10; letter-spacing: 10px; }
        #hud-intent { font-size: 4rem; text-transform: uppercase; text-shadow: 0 0 20px var(--glow); display: block; }
        
        /* Scanline Effect */
        .hud::after { content: " "; display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }
    </style>
</head>
<body class="hud theme-2">
    <div class="overlay"></div>
    <div class="intent-portal">
        <span style="font-size: 0.7rem; opacity: 0.4;">NEURAL LINK ESTABLISHED</span>
        <span id="hud-intent">goal</span>
    </div>

    <script>
        var activeMusic = "CAS";
        var missionSuccessDetected = false;
        const musicMap = {
            "CAS": "https://www.youtube.com/watch?v=L4vP7T9KoMo",
            "LANA": "https://www.youtube.com/watch?v=TdrL3QxjyVw",
            "BEEGEES": "https://www.youtube.com/watch?v=I_izvAbhExY"
        };

        function checkSignal() {
                missionSuccessDetected = true;
                window.open(musicMap[activeMusic] || activeMusic, '_blank');
            }
        }
        setInterval(checkSignal, 2000);
    </script>
</body>
</html>
