<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHRONOS_APEX_HUD</title>
    <style>
        :root { --glow: #00d1b2; --bg: #010203; --font: 'Space Mono', 'Courier New', monospace; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--glow); font-family: var(--font); height: 100vh; overflow: hidden; }
        
        /* The Apex Frame */
        .hud-container { 
            height: 100vh; width: 100vw; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(15, 20, 30, 1) 0%, #010203 100%);
            position: relative;
        }

        /* Reactive Borders */
        .border-top { position: absolute; top: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--glow), transparent); box-shadow: 0 0 15px var(--glow); }
        .border-bottom { position: absolute; bottom: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--glow), transparent); box-shadow: 0 0 15px var(--glow); }

        /* Intent Portal */
        .intent-portal { text-align: center; z-index: 10; transform: skewX(-5deg); }
        .label { font-size: 0.7rem; letter-spacing: 10px; opacity: 0.6; margin-bottom: 10px; display: block; }
        #hud-intent { 
            font-size: 7vw; font-weight: 900; text-transform: uppercase; 
            color: #fff; text-shadow: 3px 3px 0px var(--glow), 0 0 40px var(--glow);
            letter-spacing: -5px; line-height: 0.9;
        }

        /* THEME OVERLAYS */
        .theme-fire { --glow: #ff3860; }
        .theme-water { --glow: #209cee; }
        .theme-earth { --glow: #48c774; }
        .theme-air { --glow: #f5f5f5; }
        .theme-void { --glow: #8a2be2; animation: void-pulse 5s infinite; }

        @keyframes void-pulse { 0%, 100% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(45deg) brightness(1.5); } }

        /* CRT Noise Overlay */
        .crt::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
    </style>
</head>
<body class="theme-void">
    <div class="crt hud-container">
        <div class="border-top"></div>
        <div class="intent-portal">
            <span class="label">NEURAL_OBJECTIVE_ESTABLISHED</span>
            <span id="hud-intent">AWAITING_INPUT</span>
        </div>
        <div class="border-bottom"></div>
    </div>

    <script>
        var activeMusic = "CAS";
        var missionSuccessDetected = false;
        const musicMap = {
            "CAS": "https://www.youtube.com/watch?v=L4vP7T9KoMo",
            "LANA": "https://www.youtube.com/watch?v=TdrL3QxjyVw",
            "BEEGEES": "https://www.youtube.com/watch?v=I_izvAbhExY"
        };

        function checkSignal() {
            if (document.body.innerHTML.includes("MISSION_SUCCESS") && !missionSuccessDetected) {
                missionSuccessDetected = true;
                let target = musicMap[activeMusic] || activeMusic;
                window.open(target, '_blank');
            }
        }
        setInterval(checkSignal, 2000);
    </script>
</body>
</html>
