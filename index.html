<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IROH_SANCTUARY_V38</title>
    <style>
        :root { --sky-top: #050510; --sky-bottom: #1a1a2e; --sun-pos: 120%; --sun-glow: 0px; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; font-family: 'Space Mono', monospace; overflow: hidden; }

        /* THE SANCTUARY CANVAS */
        .sanctuary {
            height: 100vh; width: 100vw;
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: all 2s ease;
        }

        /* THE SUN */
        .sun {
            position: absolute; width: 150px; height: 150px;
            background: #ffcc00; border-radius: 50%;
            bottom: var(--sun-pos); left: 50%; transform: translateX(-50%);
            box-shadow: 0 0 var(--sun-glow) #ffcc00;
            transition: all 1s linear; z-index: 1;
        }

        /* THE SILHOUETTE (Iroh under the tree) */
        .landscape {
            position: absolute; bottom: 0; width: 100%; height: 40%;
            background: url('https://i.imgur.com/your-iroh-silhouette-placeholder.png') no-repeat center bottom;
            background-size: contain; z-index: 5;
            /* Simple CSS drawing of a hill and tree if image is missing */
            background-color: #000; clip-path: ellipse(80% 50% at 50% 100%);
        }

        /* CENTERED INTENT PORTAL */
        .portal {
            z-index: 10; text-align: center; color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #hud-intent { 
            font-size: 6vw; font-weight: 900; text-transform: uppercase; 
            letter-spacing: -2px; display: block; margin-top: 10px;
        }
        .timer-display { font-size: 1.5rem; opacity: 0.6; margin-top: 20px; }

        /* 90s UI ELEMENTS */
        .sidebar {
            position: absolute; right: 20px; top: 20px; color: #d4af37;
            text-align: right; font-size: 0.8rem; z-index: 10;
        }
    </style>
</head>
<body class="theme-void">
    <div class="sanctuary" id="canvas">
        <div class="sun" id="sun"></div>
        <div class="landscape"></div>
        
        <div class="portal">
            <span style="letter-spacing: 5px; opacity: 0.5;">DEEP_FOCUS_INITIATED</span>
            <span id="hud-intent">AWAITING_SPIRIT</span>
            <div class="timer-display" id="timer-text">--:--</div>
        </div>

        <div class="sidebar">
            PILOT: <span id="pilot-id">---</span><br>
            ELEMENT: <span id="env-type">VOID</span>
        </div>
    </div>

    <script>
        var activeMusic = "CAS";
        var missionSuccessDetected = false;
        const musicMap = {
            "CAS": "https://www.youtube.com/watch?v=L4vP7T9KoMo",
            "LANA": "https://www.youtube.com/watch?v=TdrL3QxjyVw",
            "BEEGEES": "https://www.youtube.com/watch?v=I_izvAbhExY"
        };

        function updateSunrise(percent) {
            const root = document.documentElement;
            // Percent 0 = Night, Percent 100 = Day
            const sunPos = 120 - (percent * 0.8); // Moves from below ground to middle sky
            const glow = percent * 0.6; // Glow intensifies
            
            root.style.setProperty('--sun-pos', sunPos + '%');
            root.style.setProperty('--sun-glow', (percent * 1.5) + 'px');
            
            if(percent > 50) {
                root.style.setProperty('--sky-top', '#87CEEB');
                root.style.setProperty('--sky-bottom', '#E0F6FF');
            }
        }

        function checkSignal() {
            // The bot will append to update the sun
            const html = document.body.innerHTML;
            const match = html.match(//);
            if(match) updateSunrise(parseInt(match[1]));

                missionSuccessDetected = true;
                window.open(musicMap[activeMusic] || activeMusic, '_blank');
            }
        }
        setInterval(checkSignal, 1000);
    </script>
</body>
</html>
